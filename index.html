<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Picagem Industrial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; --white: #ffffff; }
        
        html { font-size: 10px; height: 100%; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 2rem;
            color: var(--primary); 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box;
        }
        
        .box { 
            background: var(--white); border-radius: 4rem; padding: 4rem; width: 100%; 
            max-width: 80rem; box-shadow: 0 2rem 5rem rgba(0,0,0,0.1); 
            margin-bottom: 3rem; box-sizing: border-box;
        }

        .header-box { display: flex; justify-content: space-between; align-items: center; }
        .header-box img { height: 6rem; }
        .versao { font-size: 1.5rem; font-weight: bold; color: #7f8c8d; }

        .tab-bar { display: flex; width: 100%; max-width: 80rem; margin-bottom: 3rem; background: #ddd; border-radius: 3rem; padding: 0.5rem; }
        .tab-btn { flex: 1; padding: 2rem; border: none; border-radius: 2.5rem; cursor: pointer; font-weight: bold; font-size: 1.8rem; background: transparent; }
        .tab-btn.active { background: var(--white); color: var(--secondary); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }

        h3 { margin: 0 0 2rem 0; font-size: 2.5rem; }
        label { display: block; font-weight: bold; color: var(--secondary); font-size: 1.4rem; margin-top: 1.5rem; text-transform: uppercase; }
        
        input { width: 100%; padding: 2rem; margin: 1rem 0 2rem 0; border: 0.4rem solid #ddd; border-radius: 2rem; font-size: 2.2rem; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 2rem; cursor: pointer; background: var(--secondary); color: white; border: none; border-radius: 2rem; font-size: 2rem; font-weight: bold; text-transform: uppercase; }
        
        .btn-limpar { background: #f8f9fa; color: #e74c3c; border: 0.3rem solid #e74c3c; padding: 1rem 2rem; font-size: 1.4rem; width: auto; }
        .btn-danger { background: var(--error); margin-top: 2rem; }
        
        .tab-content { width: 100%; max-width: 80rem; }
        .hidden { display: none; }

        .acordeao { background: var(--white); border-radius: 2rem; margin-bottom: 2rem; box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.05); overflow: hidden; }
        .cabecalho { padding: 2.5rem; cursor: pointer; font-size: 1.8rem; font-weight: bold; display: flex; justify-content: space-between; border-left: 1rem solid var(--secondary); }
        .conteudo { display: none; padding: 2rem; font-size: 1.6rem; border-top: 0.2rem solid #eee; }
        .badge { background: var(--secondary); color: white; padding: 0.5rem 1.5rem; border-radius: 2rem; }
        
        #contador-display { font-size: 6rem; text-align: center; margin: 2rem 0; color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="box header-box">
        <img src="https://github.com/user-attachments/assets/7df2b6a5-d732-4175-8f59-9c644d62934b" alt="Logo">
        <span class="versao">v2.2.0</span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="trocarTab('picagem')">PICAGEM</button>
        <button class="tab-btn" onclick="trocarTab('historico')">HISTÓRICO</button>
    </div>

    <div id="tab-picagem" class="tab-content">
        <div id="setup" class="box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Identificação</h3>
                <button class="btn-limpar" onclick="limparIdentificacao()">Limpar</button>
            </div>
            <label>Nome</label>
            <input type="text" id="nomeColaborador">
            <label>Quantidade</label>
            <input type="number" id="qtdTotal">
            <button onclick="iniciarLote()">INICIAR</button>
        </div>

        <div id="areaPicagem" class="box" style="display:none;">
            <h3>Progresso</h3>
            <div id="contador-display"><span id="contador">0</span> / <span id="total">0</span></div>
            <label>Data Matrix</label>
            <input type="text" id="inputScan" autocomplete="off">
        </div>

        <div id="popupEstanquidade" class="box" style="display:none;">
            <h3>Valor Estanquidade</h3>
            <input type="text" id="inputEstanquidade" autocomplete="off">
        </div>

        <div id="popupRef" class="box" style="display:none;">
            <h3>Referência</h3>
            <input type="text" id="inputReferencia" autocomplete="off">
        </div>

        <div id="popupEtiqueta" class="box" style="display:none;">
            <h3>Finalizar Lote</h3>
            <input type="text" id="inputEtiqueta" autocomplete="off">
        </div>
    </div>

    <div id="tab-historico" class="tab-content hidden">
        <div id="containerHistorico"></div>
        <button class="btn-danger" onclick="limparHistorico()">LIMPAR HISTÓRICO</button>
    </div>

    <script>
        function ajustarEscala() {
            const largura = window.innerWidth;
            document.documentElement.style.fontSize = largura < 600 ? "8px" : "10px";
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        let db, total = 0, atual = 0, dadosPicagem = [], scanTemp = "", referenciaTemp = "";
        const inputScan = document.getElementById('inputScan');

        const request = indexedDB.open("SistemaPicagemDB", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("lotes", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = (e) => { db = e.target.result; };

        function iniciarLote() {
            const nome = document.getElementById('nomeColaborador').value;
            const qtd = document.getElementById('qtdTotal').value;
            if(!nome || !qtd) return;
            total = parseInt(qtd);
            document.getElementById('total').innerText = total;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('areaPicagem').style.display = 'block';
            inputScan.focus();
        }

        inputScan.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = inputScan.value.trim();
                if (!val) return;
                scanTemp = val;
                document.getElementById('areaPicagem').style.display = 'none';
                document.getElementById('popupEstanquidade').style.display = 'block';
                document.getElementById('inputEstanquidade').focus();
            }
        });

        document.getElementById('inputEstanquidade').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value) {
                dadosPicagem.push({ dataMatrix: scanTemp, estanquidade: e.target.value });
                atual++;
                document.getElementById('contador').innerText = atual;
                e.target.value = '';
                document.getElementById('popupEstanquidade').style.display = 'none';
                
                if (atual >= total) {
                    document.getElementById('popupRef').style.display = 'block';
                    document.getElementById('inputReferencia').focus();
                } else {
                    document.getElementById('areaPicagem').style.display = 'block';
                    inputScan.value = '';
                    inputScan.focus();
                }
            }
        });

        document.getElementById('inputReferencia').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value) { 
                referenciaTemp = e.target.value; 
                document.getElementById('popupRef').style.display = 'none'; 
                document.getElementById('popupEtiqueta').style.display = 'block'; 
                document.getElementById('inputEtiqueta').focus();
            }
        });

        document.getElementById('inputEtiqueta').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value) {
                const pacote = { 
                    referencia: referenciaTemp, 
                    etiqueta: e.target.value, 
                    itens: dadosPicagem, 
                    data: new Date().toLocaleString(), 
                    colab: document.getElementById('nomeColaborador').value,
                    total: total 
                };
                
                db.transaction(["lotes"], "readwrite").objectStore("lotes").add(pacote).onsuccess = () => {
                    // Enviar para Apps Script
                    fetch("URL_DO_SEU_WEB_APP_AQUI", {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(pacote)
                    }).then(() => location.reload());
                };
            }
        });

        function trocarTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('hidden', !el.id.includes(tab)));
            if(tab === 'historico') carregarHistorico();
        }

        function carregarHistorico() {
            const container = document.getElementById('containerHistorico'); container.innerHTML = '';
            db.transaction("lotes").objectStore("lotes").openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div'); div.className = 'acordeao';
                    div.innerHTML = `<div class="cabecalho" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display=='block'?'none':'block')">ETQ: ${cursor.value.etiqueta} <span class="badge">${cursor.value.itens.length}</span></div><div class="conteudo">Data: ${cursor.value.data}</div>`;
                    container.appendChild(div); cursor.continue();
                }
            };
        }

        function limparIdentificacao() { document.getElementById('nomeColaborador').value = ''; document.getElementById('qtdTotal').value = ''; }
        function limparHistorico() { if(confirm("Limpar tudo?")) { db.transaction(["lotes"], "readwrite").objectStore("lotes").clear().onsuccess = () => location.reload(); } }
    </script>
</body>
</html>
