<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Picagem Industrial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; color: var(--primary); margin: 0; font-size: 18px; }
        .box { background: var(--white); border-radius: 20px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px; box-sizing: border-box; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-box img { height: 50px; }
        .versao { font-size: 1.1em; font-weight: bold; color: #7f8c8d; }
        .tab-bar { display: flex; width: 100%; max-width: 500px; margin-bottom: 25px; background: #ddd; border-radius: 15px; padding: 6px; }
        .tab-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1em; background: transparent; }
        .tab-btn.active { background: var(--white); color: var(--secondary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .setup-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--secondary); padding-bottom: 15px; margin-bottom: 20px; }
        h3 { margin: 0; font-size: 1.6em; }
        .btn-limpar { background: #f8f9fa; color: #e74c3c; border: 2px solid #e74c3c; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.9em; text-transform: uppercase; }
        .btn-limpar:hover { background: #e74c3c; color: white; }
        input { width: 100%; padding: 25px; margin: 20px 0; border: 3px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 1.4em; }
        button { width: 100%; padding: 25px; cursor: pointer; background: var(--secondary); color: white; border: none; border-radius: 15px; font-size: 1.3em; font-weight: bold; text-transform: uppercase; }
        .btn-danger { background: var(--error); margin-top: 20px; }
        .error-msg { color: var(--error); font-weight: bold; font-size: 1.2em; display: none; margin-bottom: 15px; text-align: center; }
        .tab-content { width: 100%; max-width: 500px; }
        .hidden { display: none; }
        .acordeao { background: var(--white); border-radius: 16px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.08); overflow: hidden; }
        .cabecalho { padding: 25px; cursor: pointer; font-size: 1.3em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--secondary); }
        .conteudo { display: none; padding: 25px; background: #fafafa; border-top: 1px solid #eee; font-size: 1.1em; line-height: 1.6; }
        .badge { background: var(--secondary); color: white; padding: 8px 20px; border-radius: 30px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="box header-box">
        <img src="https://github.com/user-attachments/assets/7df2b6a5-d732-4175-8f59-9c644d62934b" alt="Logo">
        <span class="versao">v2.0.1</span>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="trocarTab('picagem')">PICAGEM</button>
        <button class="tab-btn" onclick="trocarTab('historico')">HISTÓRICO</button>
    </div>
    <div id="tab-picagem" class="tab-content">
        <div id="setup" class="box">
            <div class="setup-header">
                <h3>Identificação</h3>
                <button class="btn-limpar" onclick="limparIdentificacao()">Limpar</button>
            </div>
            <input type="text" id="nomeColaborador" placeholder="Nome do Colaborador">
            <input type="number" id="qtdTotal" placeholder="Quantidade de Peças">
            <button onclick="iniciarLote()">INICIAR</button>
        </div>
        <div id="areaPicagem" class="box" style="display:none;">
            <h3>Progresso</h3>
            <div id="erroDuplicado" class="error-msg">Código já picado!</div>
            <div style="font-size: 4em; text-align: center; margin: 30px 0; color: var(--secondary);">
                <span id="contador">0</span> / <span id="total">0</span>
            </div>
            <input type="text" id="inputScan" placeholder="Escanear Data Matrix..." autocomplete="off">
        </div>
        <div id="popupRef" class="box" style="display:none;">
            <h3>Referência</h3>
            <input type="text" id="inputReferencia" placeholder="Escanear/Digitar Referência" autocomplete="off">
        </div>
        <div id="popupEtiqueta" class="box" style="display:none;">
            <h3>Finalizar Lote</h3>
            <input type="text" id="inputEtiqueta" placeholder="Escanear Número de Etiqueta" autocomplete="off">
        </div>
    </div>
    <div id="tab-historico" class="tab-content hidden">
        <div id="containerHistorico"></div>
        <button class="btn-danger" onclick="limparHistorico()">LIMPAR HISTÓRICO</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log('PWA: Service Worker registrado'));
        }
        let db, total = 0, atual = 0, scansAtuais = [];
        let referenciaTemp = "";
        const inputScan = document.getElementById('inputScan');
        window.onload = () => {
            if(localStorage.getItem('colaborador')) document.getElementById('nomeColaborador').value = localStorage.getItem('colaborador');
            if(localStorage.getItem('quantidade')) document.getElementById('qtdTotal').value = localStorage.getItem('quantidade');
        };
        function limparIdentificacao() { localStorage.removeItem('colaborador'); localStorage.removeItem('quantidade'); document.getElementById('nomeColaborador').value = ''; document.getElementById('qtdTotal').value = ''; }
        function trocarTab(tab) { document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById('tab-' + tab).classList.remove('hidden'); event.currentTarget.classList.add('active'); if(tab === 'historico') carregarHistorico(); }
        const request = indexedDB.open("SistemaPicagemDB", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("lotes", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = (e) => { db = e.target.result; };
        function iniciarLote() { const nome = document.getElementById('nomeColaborador').value; const qtd = document.getElementById('qtdTotal').value; if(!nome || !qtd || qtd <= 0) { alert("Preencha os campos iniciais."); return; } localStorage.setItem('colaborador', nome); localStorage.setItem('quantidade', qtd); total = parseInt(qtd); document.getElementById('total').innerText = total; scansAtuais = []; atual = 0; document.getElementById('contador').innerText = '0'; document.getElementById('setup').style.display = 'none'; document.getElementById('areaPicagem').style.display = 'block'; inputScan.focus(); }
        inputScan.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const val = inputScan.value.trim(); if (!val) return; if (scansAtuais.includes(val)) { document.getElementById('erroDuplicado').style.display = 'block'; inputScan.value = ''; return; } document.getElementById('erroDuplicado').style.display = 'none'; scansAtuais.push(val); atual++; document.getElementById('contador').innerText = atual; inputScan.value = ''; if (atual >= total) { document.getElementById('areaPicagem').style.display = 'none'; document.getElementById('popupRef').style.display = 'block'; document.getElementById('inputReferencia').focus(); } } });
        document.getElementById('inputReferencia').addEventListener('keypress', (e) => { if (e.key === 'Enter' && document.getElementById('inputReferencia').value) { referenciaTemp = document.getElementById('inputReferencia').value; document.getElementById('popupRef').style.display = 'none'; document.getElementById('popupEtiqueta').style.display = 'block'; document.getElementById('inputEtiqueta').focus(); } });
        document.getElementById('inputEtiqueta').addEventListener('keypress', (e) => { if (e.key === 'Enter' && document.getElementById('inputEtiqueta').value) finalizar(); });
        function finalizar() { const etiqueta = document.getElementById('inputEtiqueta').value; const nome = document.getElementById('nomeColaborador').value; const agora = new Date(); const dataFormatada = ("0" + agora.getDate()).slice(-2) + "/" + ("0" + (agora.getMonth() + 1)).slice(-2) + "/" + agora.getFullYear() + " " + ("0" + agora.getHours()).slice(-2) + ":" + ("0" + agora.getMinutes()).slice(-2); const dados = { referencia: referenciaTemp, etiqueta: etiqueta, scans: scansAtuais, data: dataFormatada, colab: nome, total: total }; fetch('https://script.google.com/macros/s/AKfycbwO88Rq6RvOuJaS_LLB-LfzXCfyklWmJo0uuJo-o7Od37SHVKU1UJxf0XCpdc9Bl3mm/exec', { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) }).then(() => { db.transaction(["lotes"], "readwrite").objectStore("lotes").add(dados).onsuccess = () => { location.reload(); }; }).catch(() => { alert("Erro ao enviar para o Drive, mas o dado foi salvo no histórico local."); location.reload(); }); }
        function limparHistorico() { if(confirm("Tem a certeza?")) { const pin = prompt("Insira o código:"); if(pin === "1563") { db.transaction(["lotes"], "readwrite").objectStore("lotes").clear().onsuccess = () => { localStorage.clear(); carregarHistorico(); location.reload(); }; } } }
        function carregarHistorico() { const container = document.getElementById('containerHistorico'); container.innerHTML = ''; db.transaction("lotes").objectStore("lotes").openCursor(null, 'prev').onsuccess = (e) => { const cursor = e.target.result; if (cursor) { const div = document.createElement('div'); div.className = 'acordeao'; div.innerHTML = `<div class="cabecalho" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display=='block'?'none':'block')">Etiqueta: ${cursor.value.etiqueta} <span class="badge">${cursor.value.scans.length}</span></div><div class="conteudo"><strong>Colaborador:</strong> ${cursor.value.colab || 'N/A'}<br><strong>Ref:</strong> ${cursor.value.referencia}<br><strong>Data:</strong> ${cursor.value.data}<ul>${cursor.value.scans.map(s=>`<li>${s}</li>`).join('')}</ul></div>`; container.appendChild(div); cursor.continue(); } }; }
        [inputScan, document.getElementById('inputReferencia'), document.getElementById('inputEtiqueta')].forEach(el => { el.addEventListener('blur', () => setTimeout(() => el.focus(), 50)); });
    </script>
</body>
</html>
