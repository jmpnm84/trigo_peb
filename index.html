<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Picagem Industrial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; --white: #ffffff; }
        
        html, body { height: 100%; margin: 0; padding: 0; width: 100%; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            color: var(--primary); 
            font-size: 26px;
            padding: 30px;
            box-sizing: border-box;
        }
        
        .box { 
            background: var(--white); 
            border-radius: 40px; 
            padding: 50px; 
            width: 100%; 
            max-width: 800px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            margin-bottom: 40px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-box { flex-direction: row; justify-content: space-between; }
        .header-box img { height: 90px; }
        .versao { font-size: 1.2em; font-weight: bold; color: #7f8c8d; }

        .tab-bar { display: flex; width: 100%; max-width: 800px; margin-bottom: 40px; background: #ddd; border-radius: 30px; padding: 10px; }
        .tab-btn { flex: 1; padding: 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1.4em; background: transparent; }
        .tab-btn.active { background: var(--white); color: var(--secondary); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .setup-header { width: 100%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--secondary); padding-bottom: 30px; margin-bottom: 40px; }
        h3 { margin: 0; font-size: 2.2em; }
        
        label { width: 100%; font-weight: bold; color: var(--secondary); font-size: 0.8em; margin-top: 20px; text-transform: uppercase; padding-left: 10px; }
        
        .btn-limpar { 
            background: #f8f9fa; color: #e74c3c; border: 4px solid #e74c3c; 
            padding: 20px 40px; border-radius: 20px; cursor: pointer; 
            font-weight: bold; font-size: 1.1em; text-transform: uppercase;
        }

        input { width: 100%; padding: 40px; margin: 10px 0 30px 0; border: 5px solid #ddd; border-radius: 25px; box-sizing: border-box; font-size: 2em; text-align: center; }
        button { width: 100%; padding: 40px; cursor: pointer; background: var(--secondary); color: white; border: none; border-radius: 25px; font-size: 1.8em; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        
        .btn-danger { background: var(--error); margin-top: 40px; }
        .error-msg { color: var(--error); font-weight: bold; font-size: 1.8em; display: none; margin-bottom: 30px; text-align: center; }
        
        .tab-content { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none; }

        .acordeao { width: 100%; background: var(--white); border-radius: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .cabecalho { padding: 45px; cursor: pointer; font-size: 1.8em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-left: 15px solid var(--secondary); }
        .conteudo { display: none; padding: 40px; background: #fafafa; border-top: 3px solid #eee; font-size: 1.5em; line-height: 2; }
        .badge { background: var(--secondary); color: white; padding: 12px 30px; border-radius: 50px; font-size: 1em; }
    </style>
</head>
<body>

    <div class="box header-box">
        <img src="https://github.com/user-attachments/assets/7df2b6a5-d732-4175-8f59-9c644d62934b" alt="Logo">
        <span class="versao">v2.0.0</span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="trocarTab('picagem')">PICAGEM</button>
        <button class="tab-btn" onclick="trocarTab('historico')">HISTÓRICO</button>
    </div>

    <div id="tab-picagem" class="tab-content">
        <div id="setup" class="box">
            <div class="setup-header">
                <h3>Identificação</h3>
                <button class="btn-limpar" onclick="limparIdentificacao()">Limpar</button>
            </div>
            <label>Nome</label>
            <input type="text" id="nomeColaborador" placeholder="Nome do Colaborador">
            <label>Quantidade</label>
            <input type="number" id="qtdTotal" placeholder="Quantidade de Peças">
            <button onclick="iniciarLote()">INICIAR</button>
        </div>

        <div id="areaPicagem" class="box" style="display:none;">
            <h3>Progresso</h3>
            <div id="erroDuplicado" class="error-msg">Código já picado!</div>
            <div style="font-size: 8em; text-align: center; margin: 50px 0; color: var(--secondary); font-weight: bold;">
                <span id="contador">0</span> / <span id="total">0</span>
            </div>
            <label>Data Matrix</label>
            <input type="text" id="inputScan" placeholder="Picar Data Matrix..." autocomplete="off">
        </div>

        <div id="popupRef" class="box" style="display:none;">
            <h3>Referência</h3>
            <label>Referência</label>
            <input type="text" id="inputReferencia" placeholder="Picar Referência" autocomplete="off">
        </div>

        <div id="popupEtiqueta" class="box" style="display:none;">
            <h3>Finalizar Lote</h3>
            <label>Número de etiqueta</label>
            <input type="text" id="inputEtiqueta" placeholder="Picar Etiqueta" autocomplete="off">
        </div>
    </div>

    <div id="tab-historico" class="tab-content hidden">
        <div id="containerHistorico" style="width: 100%;"></div>
        <button class="btn-danger" onclick="limparHistorico()">LIMPAR HISTÓRICO</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let db, total = 0, atual = 0, scansAtuais = [];
        let referenciaTemp = "";
        const inputScan = document.getElementById('inputScan');

        window.onload = () => {
            if(localStorage.getItem('colaborador')) document.getElementById('nomeColaborador').value = localStorage.getItem('colaborador');
            if(localStorage.getItem('quantidade')) document.getElementById('qtdTotal').value = localStorage.getItem('quantidade');
        };

        function limparIdentificacao() { localStorage.removeItem('colaborador'); localStorage.removeItem('quantidade'); document.getElementById('nomeColaborador').value = ''; document.getElementById('qtdTotal').value = ''; }
        function trocarTab(tab) { document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById('tab-' + tab).classList.remove('hidden'); event.currentTarget.classList.add('active'); if(tab === 'historico') carregarHistorico(); }

        const request = indexedDB.open("SistemaPicagemDB", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("lotes", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = (e) => { db = e.target.result; };

        function iniciarLote() {
            const nome = document.getElementById('nomeColaborador').value;
            const qtd = document.getElementById('qtdTotal').value;
            if(!nome || !qtd || qtd <= 0) { alert("Preencha os campos."); return; }
            localStorage.setItem('colaborador', nome); localStorage.setItem('quantidade', qtd);
            total = parseInt(qtd); document.getElementById('total').innerText = total;
            scansAtuais = []; atual = 0; document.getElementById('contador').innerText = '0';
            document.getElementById('setup').style.display = 'none'; document.getElementById('areaPicagem').style.display = 'flex';
            inputScan.focus();
        }

        inputScan.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = inputScan.value.trim();
                if (!val) return;
                if (scansAtuais.includes(val)) { document.getElementById('erroDuplicado').style.display = 'block'; inputScan.value = ''; return; }
                document.getElementById('erroDuplicado').style.display = 'none';
                scansAtuais.push(val); atual++; document.getElementById('contador').innerText = atual; inputScan.value = '';
                if (atual >= total) { document.getElementById('areaPicagem').style.display = 'none'; document.getElementById('popupRef').style.display = 'flex'; document.getElementById('inputReferencia').focus(); }
            }
        });

        document.getElementById('inputReferencia').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('inputReferencia').value) { referenciaTemp = document.getElementById('inputReferencia').value; document.getElementById('popupRef').style.display = 'none'; document.getElementById('popupEtiqueta').style.display = 'flex'; document.getElementById('inputEtiqueta').focus(); }
        });

        document.getElementById('inputEtiqueta').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('inputEtiqueta').value) finalizar();
        });

        function finalizar() {
            const etiqueta = document.getElementById('inputEtiqueta').value;
            const dados = { referencia: referenciaTemp, etiqueta: etiqueta, scans: scansAtuais, data: new Date().toLocaleString(), colab: document.getElementById('nomeColaborador').value, total: total };
            fetch('https://script.google.com/macros/s/AKfycbwO88Rq6RvOuJaS_LLB-LfzXCfyklWmJo0uuJo-o7Od37SHVKU1UJxf0XCpdc9Bl3mm/exec', { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) }).then(() => { db.transaction(["lotes"], "readwrite").objectStore("lotes").add(dados).onsuccess = () => location.reload(); }).catch(() => { alert("Erro de conexão."); location.reload(); });
        }

        function limparHistorico() {
            if(confirm("Tem a certeza?")) { const pin = prompt("Código:"); if(pin === "1563") { db.transaction(["lotes"], "readwrite").objectStore("lotes").clear().onsuccess = () => { localStorage.clear(); location.reload(); }; } }
        }

        function carregarHistorico() {
            const container = document.getElementById('containerHistorico'); container.innerHTML = '';
            db.transaction("lotes").objectStore("lotes").openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div'); div.className = 'acordeao';
                    div.innerHTML = `<div class="cabecalho" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display=='block'?'none':'block')">Etiqueta: ${cursor.value.etiqueta} <span class="badge">${cursor.value.scans.length}</span></div><div class="conteudo"><strong>Data:</strong> ${cursor.value.data}<br><strong>Colab:</strong> ${cursor.value.colab}<br><ul>${cursor.value.scans.map(s=>`<li>${s}</li>`).join('')}</ul></div>`;
                    container.appendChild(div); cursor.continue();
                }
            };
        }
        [inputScan, document.getElementById('inputReferencia'), document.getElementById('inputEtiqueta')].forEach(el => el.addEventListener('blur', () => setTimeout(() => el.focus(), 50)));
    </script>
</body>
</html>
