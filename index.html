<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 15px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <h2>Leitor DataMatrix</h2>
    
    <div id="step1">
        <label>Aguardando leitura:</label>
        <input type="text" id="scannerInput" autofocus placeholder="Escaneie o código aqui...">
    </div>

    <div id="step2" class="hidden">
        <p>Código: <strong id="displayCode"></strong></p>
        <input type="number" id="valueInput" placeholder="Insira o valor" inputmode="decimal">
        <button onclick="saveData()">Guardar</button>
    </div>

    <h3>Histórico</h3>
    <table id="historyTable">
        <thead><tr><th>Data/Hora</th><th>Código</th><th>Valor</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let db;
        let currentCode = "";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwO88Rq6RvOuJaS_LLB-LfzXCfyklWmJo0uuJo-o7Od37SHVKU1UJxf0XCpdc9Bl3mm/exec";
        
        const request = indexedDB.open("ScannerDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("leituras", { autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; renderHistory(); };

        document.getElementById('scannerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                currentCode = this.value;
                document.getElementById('displayCode').innerText = currentCode;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('valueInput').focus();
                this.value = "";
            }
        });

        function saveData() {
            const val = document.getElementById('valueInput').value;
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('pt-PT') + ' ' + 
                            now.getHours().toString().padStart(2, '0') + ':' + 
                            now.getMinutes().toString().padStart(2, '0');

            const data = { code: currentCode, value: val, timestamp: dateStr };

            const tx = db.transaction("leituras", "readwrite");
            tx.objectStore("leituras").add(data);
            
            const formData = new FormData();
            formData.append('code', data.code);
            formData.append('value', data.value);
            formData.append('timestamp', data.timestamp);

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' })
                .catch(err => console.error("Erro no envio:", err));

            document.getElementById('valueInput').value = "";
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('scannerInput').focus();
            renderHistory();
        }

        function renderHistory() {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = "";
            db.transaction("leituras").objectStore("leituras").openCursor(null, 'prev').onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    tbody.innerHTML += `<tr><td>${cursor.value.timestamp}</td><td>${cursor.value.code}</td><td>${cursor.value.value}</td></tr>`;
                    cursor.continue();
                }
            };
        }
    </script>
</body>
</html>
