<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f4f4f9; margin: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { height: 50px; }
        .version { font-size: 16px; color: #333; font-weight: bold; background: #ddd; padding: 5px 10px; border-radius: 5px; }

        .hidden { display: none; }
        
        /* Botões grandes para toque */
        button { 
            width: 100%; 
            padding: 25px; 
            font-size: 20px; 
            font-weight: bold; 
            margin: 10px 0; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px;
        }
        .btn-save { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        
        input { width: 100%; padding: 20px; margin: 10px 0; font-size: 22px; box-sizing: border-box; border: 2px solid #ccc; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; font-size: 18px; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://github.com/user-attachments/assets/7df2b6a5-d732-4175-8f59-9c644d62934b" alt="Logo" class="logo">
        <div class="version">v1.0.0</div>
    </div>

    <h2>Leitor DataMatrix</h2>
    
    <div id="step1">
        <input type="text" id="scannerInput" autofocus placeholder="🔍 Escaneie o código aqui...">
    </div>

    <div id="step2" class="hidden">
        <p>Código: <strong id="displayCode" style="font-size: 20px;"></strong></p>
        <input type="number" id="valueInput" placeholder="🔢 Insira o valor" inputmode="decimal">
        <button class="btn-save" onclick="saveData()">💾 Guardar</button>
        <button class="btn-cancel" onclick="cancelEntry()">❌ Cancelar</button>
    </div>

    <h3>Histórico</h3>
    <table id="historyTable">
        <thead><tr><th>Hora</th><th>Código</th><th>Valor</th></tr></thead>
        <tbody></tbody>
    </table>

    <button class="btn-danger" onclick="clearHistory()">🗑️ Limpar Histórico</button>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let db;
        let currentCode = "";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwO88Rq6RvOuJaS_LLB-LfzXCfyklWmJo0uuJo-o7Od37SHVKU1UJxf0XCpdc9Bl3mm/exec";
        
        const request = indexedDB.open("ScannerDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("leituras", { autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; renderHistory(); };

        document.getElementById('scannerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = this.value;
                const transaction = db.transaction("leituras", "readonly");
                const store = transaction.objectStore("leituras");
                
                let found = false;
                store.openCursor().onsuccess = (event) => {
                    const cursor = event.target.result;
                    if (cursor) {
                        if (cursor.value.code === code) found = true;
                        cursor.continue();
                    } else {
                        if (found) {
                            alert("⚠️ Este código já foi registrado!");
                            document.getElementById('scannerInput').value = "";
                        } else {
                            currentCode = code;
                            document.getElementById('displayCode').innerText = currentCode;
                            document.getElementById('step1').classList.add('hidden');
                            document.getElementById('step2').classList.remove('hidden');
                            document.getElementById('valueInput').focus();
                            document.getElementById('scannerInput').value = "";
                        }
                    }
                };
            }
        });

        function saveData() {
            const val = document.getElementById('valueInput').value;
            if(!val) { alert("Por favor, insira um valor."); return; }
            const now = new Date();
            const dateStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            const data = { code: currentCode, value: val, timestamp: dateStr };

            const tx = db.transaction("leituras", "readwrite");
            tx.objectStore("leituras").add(data);
            
            const formData = new FormData();
            formData.append('code', data.code);
            formData.append('value', data.value);
            formData.append('timestamp', data.timestamp);

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
            cancelEntry();
            renderHistory();
        }

        function cancelEntry() {
            document.getElementById('valueInput').value = "";
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('scannerInput').focus();
        }

        function clearHistory() {
            if (confirm("⚠️ Tem certeza que deseja apagar todo o histórico?")) {
                const tx = db.transaction("leituras", "readwrite");
                tx.objectStore("leituras").clear();
                tx.oncomplete = () => renderHistory();
            }
        }

        function renderHistory() {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = "";
            db.transaction("leituras").objectStore("leituras").openCursor(null, 'prev').onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    tbody.innerHTML += `<tr><td>${cursor.value.timestamp}</td><td>${cursor.value.code}</td><td>${cursor.value.value}</td></tr>`;
                    cursor.continue();
                }
            };
        }
    </script>
</body>
</html>
